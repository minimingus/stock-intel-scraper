name: Daily Trading Brief

on:
  schedule:
    - cron: "0,30 * * * *"   # every 30 min (testing)
  workflow_dispatch:

jobs:
  market-check:
    runs-on: ubuntu-latest
    outputs:
      open: ${{ steps.check.outputs.open }}
    steps:
      - name: Check NYSE holiday
        id: check
        run: |
          python3 - <<'EOF'
          import os
          from datetime import date

          # NYSE holidays 2025-2026 (observed dates)
          HOLIDAYS = {
              # 2025
              date(2025, 1, 1),   # New Year's Day
              date(2025, 1, 20),  # MLK Day
              date(2025, 2, 17),  # Presidents' Day
              date(2025, 4, 18),  # Good Friday
              date(2025, 5, 26),  # Memorial Day
              date(2025, 7, 4),   # Independence Day
              date(2025, 9, 1),   # Labor Day
              date(2025, 11, 27), # Thanksgiving
              date(2025, 12, 25), # Christmas
              # 2026
              date(2026, 1, 1),   # New Year's Day
              date(2026, 1, 19),  # MLK Day
              date(2026, 2, 16),  # Presidents' Day
              date(2026, 4, 3),   # Good Friday
              date(2026, 5, 25),  # Memorial Day
              date(2026, 7, 3),   # Independence Day (observed, Jul 4 is Sat)
              date(2026, 9, 7),   # Labor Day
              date(2026, 11, 26), # Thanksgiving
              date(2026, 12, 25), # Christmas
          }

          today = date.today()
          is_open = today not in HOLIDAYS
          result = "true" if is_open else "false"
          print(f"Today: {today} | Market open: {result}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"open={result}\n")
          EOF

  brief:
    needs: market-check
    if: needs.market-check.outputs.open == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      CT0: ${{ secrets.CT0 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install bird CLI
        run: |
          npm install -g @steipete/bird --prefix /opt/bird-cli
          echo "BIRD_BIN=/opt/bird-cli/bin/bird" >> $GITHUB_ENV

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: data/twitter_intel.db
          key: db-${{ github.run_id }}
          restore-keys: db-

      - name: Scrape experts
        run: python scripts/run_intel.py scrape

      - name: Send brief
        run: python scripts/run_intel.py brief

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/twitter_intel.db
          key: db-${{ github.run_id }}
