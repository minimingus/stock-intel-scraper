name: Backfill New Experts

on:
  workflow_dispatch:
    inputs:
      handles:
        description: "Comma-separated handles to backfill (leave empty for all new experts)"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      CT0: ${{ secrets.CT0 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install bird CLI
        run: npm install -g @steipete/bird

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: data/twitter_intel.db
          key: db-${{ github.run_id }}
          restore-keys: db-

      - name: Backfill experts
        run: python scripts/run_intel.py backfill "${{ github.event.inputs.handles }}"

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/twitter_intel.db
          key: db-${{ github.run_id }}
